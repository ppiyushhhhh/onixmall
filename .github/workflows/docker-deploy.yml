name: Docker CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Docker App on EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy Docker App to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/onixmall

            git fetch origin main
            git reset --hard origin/main

            sudo systemctl stop nginx || true
            sudo systemctl disable nginx || true

            sudo docker-compose down || true

            sudo docker rm -f onixmall-frontend || true
            sudo docker rm -f onixmall-backend || true
            sudo docker rm -f onixmall-mongo || true

            sudo fuser -k 80/tcp || true

            sudo docker-compose up -d --build

            sudo docker ps
            curl -I http://localhost
